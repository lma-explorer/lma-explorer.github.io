project:
  type: website
  output-dir: _site
  preview:
    port: 4848
  # Generate analyst-friendly download artifacts (CSV + XLSX) alongside each
  # canonical *.parquet in data/processed/, then copy the whole folder into
  # _site/data/processed/ so download links on chart pages and the data
  # catalog actually resolve on the deployed site. The script handles both
  # phases: pre-render generates CSVs/XLSXs from parquets; post-render copies
  # the full folder into the rendered output. See scripts/prepare_downloads.py.
  pre-render:
    - python3 ../scripts/prepare_downloads.py --phase pre
  post-render:
    - python3 ../scripts/prepare_downloads.py --phase post

website:
  title: "Livestock Marketing Alternatives Explorer"
  description: "An interactive, continuously-updated explorer of public USDA-AMS feeder-cattle price data for the four-corners region — built on public-domain USDA, BLS, and NASS feeds."
  site-url: "https://lma-explorer.github.io"
  repo-url: "https://github.com/lma-explorer/lma-explorer.github.io"
  repo-subdir: site
  repo-actions: [edit, source, issue]
  back-to-top-navigation: true
  page-navigation: true
  reader-mode: false
  twitter-card: true
  open-graph: true

  navbar:
    background: light
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Price–weight explorer"
        href: price-weight.qmd
      - text: "Weekly seasonality"
        href: seasonality.qmd
      - text: "Weekly trends"
        href: weekly-trends.qmd
      - text: "Basis"
        href: basis.qmd
      - text: "Sell-now compare"
        href: sell-now-compare.qmd
      - text: "LRP"
        href: lrp.qmd
      - text: "Methodology"
        href: methodology/index.qmd
      - text: "Data"
        href: data.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/lma-explorer/lma-explorer.github.io
        aria-label: GitHub repository

  page-footer:
    left: |
      Built primarily on public USDA-AMS, BLS, and USDA NASS data; basis figures are derived from non-redistributed CME settle inputs (see [data licensing](https://github.com/lma-explorer/lma-explorer.github.io/blob/main/LICENSE-DATA.md)). Code MIT; content and derived data CC-BY-4.0.
    right: |
      See [GOVERNANCE](https://github.com/lma-explorer/lma-explorer.github.io/blob/main/GOVERNANCE.md) and [CITATION](https://github.com/lma-explorer/lma-explorer.github.io/blob/main/CITATION.cff).

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    link-external-newwindow: true
    link-external-icon: true
    code-fold: true
    code-summary: "Show the code"
    fig-responsive: true
    email-obfuscation: references

execute:
  freeze: auto
  echo: false
  warning: false

editor: source
