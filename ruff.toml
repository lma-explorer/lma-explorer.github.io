# Ruff configuration.
#
# Conservative on purpose: this project values readable, well-commented code
# over a strict style checker. Ruff is here to catch real bugs (unused
# imports, undefined names, syntax errors) — not to police line length on
# rationale-heavy docstrings.

# Long line allowance. The project's docstrings carry rationale; a hard
# 88-char limit forces awkward line breaks that hurt readability.
line-length = 100

# Source roots. Tests live at the repo root, pipelines too.
extend-exclude = [
    "_site",
    ".quarto",
    "_freeze",
    "data/processed",
    "site/_site",
]

[lint]
# Default rules: pyflakes (F) and pycodestyle errors (E). These are the
# bug-finding rules. Style rules (W warnings, naming N, complexity C) are
# off by default to stay reviewer-friendly.
select = ["E", "F"]

# Per-rule ignores.
ignore = [
    "E501",   # let line-length govern; rare exceedances are intentional.
    # F541 catches `f"text"` (f-string with no placeholders). Frequent
    # in pipeline `print` statements written before the chart shelf
    # stabilized — the `f` prefix is leftover from a stage when those
    # strings interpolated values that have since been moved into
    # neighbouring lines. Style issue, not a bug. Addressing the ~90
    # instances is queued as a separate cosmetic sweep; for now we
    # tolerate them so ruff stays useful for the bug-finding rules
    # (F401, F811, F841).
    "F541",
]

[lint.per-file-ignores]
# Tests use synthetic data with intentionally-long literal expressions.
"tests/**/*.py" = ["E501"]
