name: Build and deploy Quarto site

# Rebuild the site on any push to main, when the monthly BLS refresh succeeds
# (so the manifest and charts pick up the new vintage), and weekly as a
# belt-and-suspenders defense against drift.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["BLS CPI monthly refresh"]
    types: [completed]
  schedule:
    - cron: "0 15 * * 1"   # Mondays, 15:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: site-build
  cancel-in-progress: true

jobs:
  build:
    # Only run the workflow_run variant on success; push/schedule/dispatch always run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipelines/requirements.txt

      - name: Install Python dependencies
        # site pages read parquet at render time via Python code cells.
        run: pip install -r pipelines/requirements.txt plotly

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"

      - name: Render site
        run: quarto render site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

      - name: Open site-build-failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Site build failed on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `The Quarto site build failed.`,
              ``,
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `GitHub Pages will continue serving the previous successful build until this is resolved.`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["site-build-failure", "automated"],
            });

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
