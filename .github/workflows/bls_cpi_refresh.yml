name: BLS CPI monthly refresh

# Runs on the 16th of each month at 14:00 UTC (~9:00 AM US Central).
# BLS publishes CPI-U around the mid-month release window; this schedule
# gives the release a few hours to land. If we miss the window, manual
# dispatch picks up the slack.
on:
  schedule:
    - cron: "0 14 16 * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run as backfill (fetch full history from 1985)"
        required: false
        default: "false"

# Only one refresh can be in flight at a time. If a push triggers another run
# while we're still mid-refresh we let it queue rather than run in parallel.
concurrency:
  group: bls-cpi-refresh
  cancel-in-progress: false

permissions:
  contents: write      # commit the new parquet vintage and manifest
  issues: write        # open a data-source-drift issue on failure
  pull-requests: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipelines/requirements.txt

      - name: Install dependencies
        run: pip install -r pipelines/requirements.txt

      - name: Ingest
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python -m pipelines.bls.ingest --backfill
          else
            python -m pipelines.bls.ingest
          fi

      - name: Validate
        run: python -m pipelines.bls.validate

      - name: Snapshot
        run: python -m pipelines.bls.snapshot

      - name: Commit new vintage
        # If snapshot produced no changes (e.g. the monthly release hasn't landed
        # yet and we pulled the same data), we exit gracefully without a commit.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          VINTAGE=$(date -u +%Y-%m)
          git commit -m "chore(bls): refresh CPI-U vintage ${VINTAGE}"
          git push

      - name: Open data-source-drift issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `BLS CPI refresh failed on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `The scheduled BLS CPI refresh failed.`,
              ``,
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Per the Automation Over Features commitment in GOVERNANCE.md, no new parquet vintage was committed, so the published site is still serving the last-known-good snapshot. Investigate before the next monthly tick:`,
              ``,
              `1. Pull the raw payload from the failed run's artifacts (or re-run with \`workflow_dispatch\`).`,
              `2. Compare to the last-known-good raw JSON in \`data/raw/bls/\` (may need to be retrieved from a prior successful run).`,
              `3. If the change is structural, update downstream code and then \`python -m pipelines.bls.validate --rebaseline\`.`,
              `4. If the change is a value anomaly (BLS publication error), wait for BLS to correct and re-run manually.`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["data-source-drift", "automated"],
            });
