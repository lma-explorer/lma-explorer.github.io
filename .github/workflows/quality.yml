name: Quality

# Run linting and the test suite on every PR and on every push to main.
#
# Why this exists: the project's GOVERNANCE.md "Automation Over Features"
# commitment requires that every feature ship with monitoring + failure
# detection. Until this workflow existed, the only quality gate was
# maintainer review; now ruff + pytest enforce a baseline at PR-time and
# block merges on regression.
#
# Distinct from the existing `Build and deploy Quarto site` workflow:
# - That one renders the site and deploys to GitHub Pages.
# - This one runs lint + tests against the Python pipelines and the
#   backtest math, without rendering the site. It's faster (no Quarto
#   install) and runs on every PR.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One quality run per branch at a time. Pushing again cancels the
  # in-flight run on that branch — saves CI minutes during rapid
  # iteration on a PR.
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipelines/requirements.txt

      - name: Install pipeline dependencies
        # Tests import from `pipelines.*` so the pipeline deps need to be
        # installed even though we're not running the pipelines themselves.
        run: pip install -r pipelines/requirements.txt

      - name: Install dev tooling
        # ruff = lint, pytest = test runner. Both pinned to current major.
        # If either bumps a major version, this line goes red on CI before
        # the site does.
        run: pip install "ruff>=0.5,<1" "pytest>=8,<9"

      - name: Lint with ruff
        # Default rule set is conservative (no opinionated style flags).
        # Failures here are syntax errors, unused imports, unreachable code,
        # and other things any reviewer would call out.
        run: ruff check .

      - name: Run tests
        # Verbose output makes failure triage from the GitHub UI faster
        # without needing to drop into the run log.
        run: pytest tests/ -v
